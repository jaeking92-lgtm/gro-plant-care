<body>
<div class="device"><main class="phone"><div id="app"></div><div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div></main></div>

const A='assets/';

const todayLabel='오늘';
const defaultState={screen:'login',isLoggedIn:false,isGuest:false,userEmail:'',answers:{direction:'south',place:'living',pet:'no',water:'normal'},selectedPlant:'mint',plantName:'우리집 초록이',tasks:{water:false,sun:false,record:false},records:[],recordDraft:{condition:'좋음',memo:'',img:''}};
let state=loadState();
state.plantName=normalizePlantName(state.plantName);
function loadState(){
 try{
  const s=JSON.parse(localStorage.getItem(STORE)||'{}');
  return {...defaultState,...s,answers:{...defaultState.answers,...(s.answers||{})},tasks:{...defaultState.tasks,...(s.tasks||{})},records:Array.isArray(s.records)?s.records:defaultState.records,recordDraft:{...defaultState.recordDraft,...(s.recordDraft||{})}};
 }catch(e){
  return {...defaultState,recordDraft:{...defaultState.recordDraft}};
 }
}
function save(){localStorage.setItem(STORE,JSON.stringify({screen:state.screen,isLoggedIn:state.isLoggedIn,isGuest:state.isGuest,userEmail:state.userEmail,answers:state.answers,selectedPlant:state.selectedPlant,plantName:state.plantName,tasks:state.tasks,records:state.records,recordDraft:state.recordDraft}))}
function resetState(){localStorage.removeItem(STORE);state={...defaultState,answers:{...defaultState.answers},tasks:{...defaultState.tasks},records:[...defaultState.records],recordDraft:{...defaultState.recordDraft}}}
function qs(id){return document.getElementById(id)}
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function normalizePlantName(v){return String(v??'').replace(/[<>]/g,'').slice(0,12)}
function recordDateLabel(r){return `${esc(r.date||'오늘')}${r.condition?' · '+esc(r.condition):''}`}
function showToast(msg){const t=qs('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),2200)}
function nav(screen){state.screen=screen==='profile'?'home':screen;save();render()}
const directions={
  east:{label:'동향',short:'동향',desc:'아침 빛이 들어와요',img:A+'direction-east.jpg',thumb:A+'direction-east-thumb.jpg'},
  west:{label:'서향',short:'서향',desc:'오후 빛이 따뜻해요',img:A+'direction-west.jpg',thumb:A+'direction-west-thumb.jpg'},
  south:{label:'남향',short:'남향',desc:'빛이 오래 머물러요',img:A+'direction-south.jpg',thumb:A+'direction-south-thumb.jpg'},
  north:{label:'북향',short:'북향',desc:'은은한 간접광이에요',img:A+'direction-north.jpg',thumb:A+'direction-north-thumb.jpg'}
};
const places={
  living:{label:'거실',desc:'가장 밝은 공간',img:A+'place-living.jpg'}, bedroom:{label:'침실',desc:'차분한 공간',img:A+'place-bedroom.jpg'},
  kitchen:{label:'주방',desc:'허브와 잘 맞아요',img:A+'place-kitchen.jpg'}, office:{label:'서재 / 사무실',desc:'책상 가까이에',img:A+'place-office.jpg'}
};
const plants={
  mint:{name:'애플민트',nickname:'우리집 초록이',img:A+'plant-mint.jpg',tags:['허브','초보자 추천','차 활용'],desc:'향이 좋고 변화가 빠른 허브예요. 밝은 창가와 규칙적인 물주기에 잘 맞아요.'},
  basil:{name:'바질',nickname:'우리집 바질',img:A+'plant-basil.jpg',tags:['허브','요리 활용','밝은 빛'],desc:'햇빛을 좋아하고 잎의 변화가 빠른 식물이에요. 주방이나 밝은 창가에 잘 어울려요.'},
  rosemary:{name:'로즈마리',nickname:'향기 로즈마리',img:A+'plant-rosemary.jpg',tags:['향기','건조에 강함','햇빛 선호'],desc:'은은한 향이 오래 남는 허브예요. 물은 조금 덜 자주 주고 밝은 빛을 좋아해요.'}
};
const taskMeta={
  water:{title:'물 주기',time:'07:00',minutes:420,color:'#91B8C5',icon:'water'},
  sun:{title:'햇빛 비추기',time:'10:30 – 15:30',start:630,end:930,color:'#E3C46D',icon:'sun'},

const taskOrder=['water','sun','record'];

 };
 return map[name]||map.leaf
}
function status(){return `<div class="status"><span>9:41</span><div class="status-icons"><div class="signal"><i></i><i></i><i></i><i></i></div><div class="wifi"></div><div class="battery"></div></div></div>`}
function shell(inner,tab=false){return `<section class="screen ${tab?'has-tab':''}">${inner}${tab?tabs():''}</section>`}
function tabs(){const items=[['home','홈','home'],['plant','식물','plant'],['today','오늘','today'],['records','기록','record']];return `<nav class="bottom-tab" aria-label="주요 메뉴">${items.map(([s,l,i])=>`<button class="tab ${state.screen===s?'active':''}" data-nav="${s}" ${state.screen===s?'aria-current="page"':''}>${icon(i)}<span>${l}</span></button>`).join('')}</nav>`}
function progress(n){return `<div class="progress" role="progressbar" aria-label="온보딩 진행률" aria-valuemin="1" aria-valuemax="4" aria-valuenow="${n}">${[1,2,3,4].map(i=>`<span class="${i<=n?'on':''}"></span>`).join('')}</div>`}
function header(title,sub,n,back){return `${status()}<div class="content"><div class="topbar"><button class="back" data-nav="${back}" aria-label="이전 화면으로 돌아가기">${icon('back')}</button>${progress(n)}<span class="screen-count">${n}/4</span></div><div class="on-title"><h1 class="h2">${title}</h1><p class="body question-note">${sub}</p></div></div>`}
function photo(src,alt=''){return `<div class="photo"><img src="${src}" alt="${alt}"/></div>`}

function login(){return shell(`${status()}<div class="login-wrap"><img class="login-leaf a" src="${A}leaf-palm.png" alt="" aria-hidden="true"/><img class="login-leaf b" src="${A}leaf-monstera.png" alt="" aria-hidden="true"/><div class="login-head"><div class="brand-splash"><img class="brand-icon" src="${A}logo-gro.png" alt="GRO logo"/><div class="brand-copy"><p class="logo">GRO</p><span class="logo-sub">plant care</span></div></div><p class="body">식물 루틴을 저장하고<br/>오늘의 관리를 이어가세요.</p></div><form class="login-card" data-login-form novalidate><div class="login-card-header"><div><p class="login-kicker">GRO</p><h1>로그인</h1></div><p class="caption">저장된 루틴 이어보기</p></div><label class="input-field mt16" data-login-field="email">${icon('mail')}<input type="email" data-login-email aria-label="이메일" placeholder="이메일" autocomplete="email" required value="${esc(state.userEmail)}"/></label><label class="input-field mt10" data-login-field="password">${icon('lock')}<input type="password" data-login-password aria-label="비밀번호" placeholder="비밀번호 · 6자 이상" autocomplete="current-password" minlength="6" required/></label><p class="login-error" data-login-error role="alert" aria-live="polite"></p><div class="login-meta"><label class="login-check"><input type="checkbox" checked/><span aria-hidden="true">${icon('checkMini')}</span> 로그인 유지</label><button type="button" class="login-link disabled-link" aria-disabled="true" data-toast="비밀번호 찾기는 MVP 시연용이에요">비밀번호 찾기</button></div><button type="submit" class="btn">로그인하기</button><div class="social-divider"><span>간편 로그인 · 준비 중</span></div><div class="social-row"><button type="button" class="social-btn google-login is-disabled" aria-disabled="true" data-toast="Google 로그인은 준비 중이에요"><img class="social-logo" src="${A}google-logo.png" alt="Google logo"/> Google</button><button type="button" class="social-btn kakao-login is-disabled" aria-disabled="true" data-toast="Kakao 로그인은 준비 중이에요"><img class="social-logo" src="${A}kakao-logo.png" alt="Kakao logo"/> Kakao</button></div></form><button class="guest-btn" data-guest="1">로그인 없이 둘러보기</button><p class="login-footer">계정 없이도 모든 MVP 흐름을 확인할 수 있어요.</p></div>`) }

function intro(){return shell(`${status()}<div class="intro-wrap"><div class="intro-bg">${photo(A+'intro-plant.jpg')}</div><img class="leaf-decor leaf-a" src="${A}leaf-sprig.png" alt="" aria-hidden="true"/><img class="leaf-decor leaf-b" src="${A}leaf-monstera.png" alt="" aria-hidden="true"/><div class="intro-main"><div class="brand-splash intro-brand"><img class="brand-icon" src="${A}logo-gro.png" alt="GRO logo"/><div class="brand-copy"><p class="logo">GRO</p><span class="logo-sub">plant care</span></div></div><p class="body mt20" style="color:#334338">식물과 함께,<br/>더 나은 하루를 키워요.</p></div><div class="intro-copy"><button class="btn" data-nav="direction">시작하기</button></div></div>`) }
function direction(){const sel=state.answers.direction;return shell(`${header('주로 햇빛이 드는<br/>창문 방향은 어디인가요?','식물이 받는 빛의 방향을 선택해 주세요.',1,'intro')}<div class="scroll safe-cta"><div class="content mt18"><div class="scene-large">${photo(directions[sel].img,directions[sel].label)}<div class="scene-label"><b>${directions[sel].label}</b><span>${directions[sel].desc}</span></div></div><div class="choice-grid mt16">${Object.entries(directions).map(([k,d])=>`<button class="choice-card ${sel===k?'selected':''}" data-answer="direction" data-value="${k}" aria-pressed="${sel===k}"><div class="photo"><img src="${d.thumb}" alt="${d.short} 창문 예시"/></div><span class="label">${d.short}</span></button>`).join('')}</div></div></div><div class="fixed-cta"><button class="btn" data-nav="place">다음</button></div>`) }
function place(){const sel=state.answers.place;return shell(`${header('식물을 주로 어디에서<br/>키우고 있나요?','가장 오래 머무는 공간을 선택해 주세요.',2,'direction')}<div class="scroll safe-cta"><div class="content mt18"><div class="choice-grid">${Object.entries(places).map(([k,p])=>`<button class="choice-card ${sel===k?'selected':''}" data-answer="place" data-value="${k}" aria-pressed="${sel===k}">${photo(p.img,p.label)}<div><span class="label">${p.label}</span><div class="sub">${p.desc}</div></div></button>`).join('')}</div></div></div><div class="fixed-cta"><button class="btn" data-nav="pet">다음</button></div>`) }
function pet(){const sel=state.answers.pet;return shell(`${header('반려동물과 함께<br/>생활하고 계신가요?','안전한 식물을 추천하기 위해 선택해 주세요.',3,'place')}<div class="scroll safe-cta"><div class="content mt20 col" style="gap:14px"><button class="pet-choice ${sel==='yes'?'selected':''}" data-answer="pet" data-value="yes" aria-pressed="${sel==='yes'}"><div class="photo"><img src="${A}pet-yes.jpg" alt="반려동물과 함께 생활하는 공간"/></div><div class="pet-copy"><p class="h3">네, 함께 살고 있어요</p><p class="caption mt4">반려동물 안전까지 고려</p></div><span class="radio" aria-hidden="true"></span></button><button class="pet-choice ${sel==='no'?'selected':''}" data-answer="pet" data-value="no" aria-pressed="${sel==='no'}"><div class="photo pet-no-photo"><img src="${A}pet-no.png" alt="반려동물 없이 식물을 키우는 공간"/></div><div class="pet-copy"><p class="h3">아니요, 반려동물이 없어요</p><p class="caption mt4">빛과 관리 난이도 중심</p></div><span class="radio" aria-hidden="true"></span></button></div></div><div class="fixed-cta"><button class="btn" data-nav="water">다음</button></div>`) }

function recommendationProfile(id){

function recommendationReason(id){

    mint:`${direction} 빛과 ${place} 환경에서 변화를 빠르게 관찰하기 좋아요.`,

function getRecommendations(){

  }).sort((a,b)=>b.score-a.score||plants[a.id].name.localeCompare(plants[b.id].name,'ko'));

function selectTopRecommendation(){

ass="mini-icon">${icon('growth')}</span><div><b>첫 사진 기록</b><span>오늘 상태를 한 장 남기기</span></div><span class="routine-time">20:30</span></div></div></section></div></div>`,true)}

function angle(minutes){return minutes/1440*Math.PI*2-Math.PI/2}
function pt(cx,cy,r,minutes){const a=angle(minutes);return [cx+r*Math.cos(a),cy+r*Math.sin(a)]}
function arcPath(cx,cy,r,start,end){const p1=pt(cx,cy,r,start),p2=pt(cx,cy,r,end);const large=(end-start)>720?1:0;return `M ${p1[0].toFixed(2)} ${p1[1].toFixed(2)} A ${r} ${r} 0 ${large} 1 ${p2[0].toFixed(2)} ${p2[1].toFixed(2)}`}
function clockIcon(type,done,color){const name=done?'checkMini':type==='record'?'moon':type;return icon(name).replace('<svg ',`<svg x="-9" y="-9" width="18" height="18" style="color:${color}" `)}
function clockBadge(minutes,type,done,r=112){
  const [x,y]=pt(160,160,r,minutes);
  const palette=done
    ?{fill:'url(#clockDoneGradient)',icon:'#5F9A78',border:'#CFE4D5'}
    :{
      water:{fill:'url(#clockWaterGradient)',icon:'#4F91A5',border:'#C9E2EA'},
      sun:{fill:'url(#clockSunGradient)',icon:'#B98716',border:'#EED89D'},
      record:{fill:'url(#clockRecordGradient)',icon:'#7964A8',border:'#DCD4EC'}
    }[type];
  return `<g transform="translate(${x.toFixed(2)} ${y.toFixed(2)})"><circle class="clock-badge-circle" r="16" fill="${palette.fill}" stroke="${palette.border}" stroke-width="1" filter="url(#clockBadgeShadow)"/>${clockIcon(type,done,palette.icon)}</g>`
}
function clockLabel(x,y,text,fill,anchor='middle',size=12,weight=650){return `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle" fill="${fill}" font-size="${size}" font-weight="${weight}">${text}</text>`}
function clockTimeLabel(minutes,text,fill,r=126,opts={}){const [x,y]=pt(160,160,r,minutes);return clockLabel((x+(opts.dx||0)).toFixed(1),(y+(opts.dy||0)).toFixed(1),text,fill,opts.anchor||'middle',opts.size||12,opts.weight||650)}
function nextTask(){return taskOrder.find(k=>!state.tasks[k])}

  <text x="${cx}" y="180" text-anchor="middle" font-size="24" font-weight="800" fill="#426B52">${doneCount}/3</text>
</svg>`}
function varColor(key){return getComputedStyle(document.documentElement).getPropertyValue('--'+key).trim()||'#5F9A78'}
function missionReward(id){
  const done=state.tasks[id];
  if(done) return `<span class="mission-reward done">${icon('checkMini')}완료</span>`;
  if(id==='sun') return `<span class="mission-reward running">${icon('today')}확인 필요</span>`;
  if(id==='record') return `<span class="mission-reward wait">${icon('record')}기록 예정</span>`;
  return `<span class="mission-reward wait">대기</span>`;
}
function missionRow(id){
  const data={
    water:{period:'오전 루틴',title:'흙 상태 확인하고 물 주기',range:'07:00',icon:'water',klass:'morning'},
    sun:{period:'낮 루틴',title:'햇빛 위치 확인하기',range:'10:30 – 15:30',icon:'sun',klass:'day'},
    record:{period:'저녁 루틴',title:'오늘의 사진 기록하기',range:'20:30',icon:'moon',klass:'night'}
  }[id];
  return `<button class="mission-row ${state.tasks[id]?'done':''}" data-task="${id}" aria-pressed="${state.tasks[id]}">
    <span class="mission-icon ${data.klass}">${icon(data.icon)}</span>
    <span class="mission-copy">
      <span class="mission-label">${data.period}</span>
      <span class="mission-name">${data.title}</span>
      <span class="mission-time ${id==='water'?'water':id==='sun'?'sun':'record'}">${data.range}</span>
    </span>
    ${missionReward(id)}
  </button>`;
}
function today(){const done=taskOrder.filter(k=>state.tasks[k]).length;return shell(`${status()}<div class="scroll safe-tab"><div class="content today-content"><div class="topbar"><div class="brand-head"><img class="brand-mini" src="${A}logo-gro.png" alt="GRO logo"/><div><p class="logo-sm">GRO</p><p class="caption" style="color:var(--primary);letter-spacing:.12em">plant care</p></div></div><button class="iconbtn is-disabled" aria-label="오늘 관리 알림" aria-disabled="true" data-toast="오늘 알림 상세는 준비 중이에요">${icon('bell')}</button></div><h1 class="h1 mt8">오늘 관리</h1><p class="body mt6">${state.plantName}의 물·빛·기록 루틴을 확인해보세요.</p><section class="card clock-card today-clock">${clock()}</section><section class="mission-card today-mission"><div class="mission-head"><div><p class="mission-title">${icon('leaf')}오늘의 관리 루틴</p><p class="caption mt4">시간대별 루틴을 하나씩 완료해보세요</p></div><p class="mission-sub">${done}/3<br/>완료</p></div>${['water','sun','record'].map(missionRow).join('')}</section></div></div>`,true)}
function addRecord(){
  const p=plants[state.selectedPlant];
  const draft=state.recordDraft;
  const conditions=[['좋음','sun','잎과 줄기가 건강해요'],['보통','leaf','평소와 비슷해요'],['관찰 필요','heart','변화를 더 지켜볼게요']];
  return shell(`${status()}<div class="scroll safe-cta"><div class="content"><div class="topbar"><button class="back" data-nav="records" aria-label="성장 기록으로 돌아가기">${icon('back')}</button><h1 class="h3">새 성장 기록</h1><span style="width:40px"></span></div><section class="form-card mt14"><label class="record-photo-picker"><input type="file" accept="image/*" capture="environment" data-record-photo/><span class="record-upload ${draft.img?'has-photo':''}">${draft.img?`<img src="${esc(draft.img)}" alt="업로드한 오늘의 식물 사진"/><span class="record-photo-action">${icon('cam')}사진 바꾸기</span>`:`<span class="record-upload-icon">${icon('cam')}</span><b>오늘의 식물 사진 추가</b><small>카메라 또는 앨범에서 선택해 주세요</small>`}</span></label><p class="caption mt10">성장 기록에는 직접 촬영한 사진이 저장돼요.</p></section><section class="form-card mt14"><p class="form-label">오늘 상태</p><div class="condition-row">${conditions.map(([value,ic,desc])=>`<button class="condition-chip ${draft.condition===value?'selected':''}" data-condition="${value}" aria-pressed="${draft.condition===value}">${icon(ic)}<span>${value}</span><small>${desc}</small></button>`).join('')}</div></section><section class="form-card mt14"><label class="form-label" for="recordMemo">관찰 메모 <span>선택</span></label><textarea id="recordMemo" class="textarea" data-record-memo maxlength="120" placeholder="새 잎, 잎 색, 흙 상태처럼 오늘 발견한 변화를 적어보세요.">${esc(draft.memo)}</textarea><p class="caption mt8">최대 120자까지 기록할 수 있어요.</p></section></div></div><div class="fixed-cta"><button class="btn" data-save-record ${draft.img?'':'disabled'}>${draft.img?'오늘 기록 저장하기':'사진을 추가해 주세요'}</button></div>`) 
}
function records(){const p=plants[state.selectedPlant];const hasRecords=state.records.length>0;return shell(`${status()}<div class="scroll safe-tab"><div class="content"><div class="topbar"><button class="back" data-nav="home" aria-label="홈으로 돌아가기">${icon('back')}</button><div style="text-align:center"><h1 class="h3">성장 기록</h1><p class="caption mt4">${p.name} 관찰 노트</p></div><button class="iconbtn" aria-label="성장 기록 추가" data-add-record="1">${icon('plus')}</button></div>${hasRecords?`<section class="card month-card mt10"><div class="month-head"><button class="iconbtn is-disabled" aria-label="이전 주 기록" aria-disabled="true" data-toast="이전 주 기록은 준비 중이에요">${icon('back')}</button><p class="h3">첫 주 기록</p><button class="iconbtn is-disabled" aria-label="다음 주 기록" aria-disabled="true" data-toast="다음 주 기록은 준비 중이에요" style="transform:rotate(180deg)">${icon('back')}</button></div><div class="record-grid">${state.records.slice(0,5).map(r=>`<div class="record-tile"><div class="photo"><img src="${r.img}" alt="${recordDateLabel(r)}의 ${p.name}"/></div><div class="date">${recordDateLabel(r)}</div></div>`).join('')}<button class="record-tile record-add" data-add-record="1">${icon('plus')}<span>기록 추가</span></button></div></section>`:`<section class="empty-record mt14"><div class="empty-illustration">${icon('growth')}</div><h2 class="h2">아직 성장 기록이 없어요</h2><p class="body mt8">첫 사진을 남기면 ${state.plantName}의 변화가 이곳에 차곡차곡 쌓여요.</p><button class="btn-light" data-add-record="1">첫 기록 추가</button></section><div class="record-guide-grid"><div class="record-guide">${icon('cam')}<b>사진</b><span>오늘 모습</span></div><div class="record-guide">${icon('leaf')}<b>잎 상태</b><span>색과 크기</span></div><div class="record-guide">${icon('sun')}<b>컨디션</b><span>빛과 물</span></div></div><div class="empty-timeline"><div class="timeline-head"><b>첫 주 기록 흐름</b><span>1일차 준비</span></div><div class="timeline-dots"><i></i><i></i><i></i><i></i><i></i></div></div>`}<div class="record-summary stronger mt16">${icon('leaf')}<p>사진을 남기면 잎 색, 크기, 컨디션 변화를 한눈에 볼 수 있어요.</p></div></div></div>`,true)}
function profile(){return shell(`${status()}<div class="scroll safe-tab"><div class="content"><div class="topbar"><h1 class="h2">내 정보</h1><button class="iconbtn" aria-label="설정" data-toast="설정 저장 완료">${icon('menu')}</button></div><section class="card profile-card"><div class="row gap12"><div class="profile-avatar logo-avatar"><img src="${A}logo-gro.png" alt="GRO logo"/></div><div><p class="h3">GRO 사용자</p><p class="caption mt4">오늘부터 식물 루틴을 시작해요</p></div></div></section><section class="card mt16" style="padding:16px"><p class="h3">저장 설정</p><p class="body mt8">선택한 식물, 오늘 관리 상태와 기록이 이 브라우저에 저장돼요.</p></section><button class="btn-light mt16" data-reset="1">저장 상태 초기화</button><button class="btn-light mt10" data-logout="1">로그아웃</button></div></div>`,true)}
function makeNavTarget(element,screen,label){
  if(!element)return;
  element.dataset.nav=screen;
  element.classList.add('nav-surface');
  element.setAttribute('role','button');
  element.setAttribute('tabindex','0');
  element.setAttribute('aria-label',label);
}
function connectScreenNavigation(){
  makeNavTarget(qs('app').querySelector('.brand-head'),'home','홈 화면으로 이동');
  if(state.screen==='home'){
    makeNavTarget(qs('app').querySelector('.home-card .plant-profile'),'plant','등록한 식물 정보 보기');
    makeNavTarget(qs('app').querySelector('.week')?.closest('.card'),'records','이번 주 성장 기록 보기');
    makeNavTarget(qs('app').querySelector('.home-insight'),'today','오늘 관리 화면으로 이동');
  }
  if(state.screen==='plant'){
    makeNavTarget(qs('app').querySelector('.routine-card'),'today','오늘 관리 루틴 확인하기');
  }
}
function render(){
  if(!state.isLoggedIn) state.screen='login';
  if(state.screen==='profile') state.screen='home';
  const views={login,intro,direction,place,pet,water,recommend,register,home,plant,editPlant,today,records,addRecord};
  qs('app').innerHTML=(views[state.screen]||intro)();
  connectScreenNavigation();
  const scroll=qs('app').querySelector('.scroll');
  if(scroll)scroll.scrollTop=0;
}

function validateLogin(form){
  const emailInput=form.querySelector('[data-login-email]');
  const passwordInput=form.querySelector('[data-login-password]');
  const error=form.querySelector('[data-login-error]');
  const email=emailInput.value.trim();
  const password=passwordInput.value;
  form.querySelectorAll('.input-field').forEach(field=>field.classList.remove('invalid'));
  emailInput.removeAttribute('aria-invalid');
  passwordInput.removeAttribute('aria-invalid');
  let input=null;
  let message='';
  if(!email){input=emailInput;message='이메일을 입력해 주세요.'}
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){input=emailInput;message='올바른 이메일 형식으로 입력해 주 세요.'}
  else if(!password){input=passwordInput;message='비밀번호를 입력해 주세요.'}
  else if(password.length<6){input=passwordInput;message='비밀번호는 6자 이상 입력해 주세요.'}
  if(input){
    input.setAttribute('aria-invalid','true');
    input.closest('.input-field').classList.add('invalid');
    error.textContent=message;
    input.focus();
    return null;
  }
  error.textContent='';
  return email;
}

function compressRecordPhoto(file){
  return new Promise((resolve,reject)=>{
    if(!file||!file.type.startsWith('image/')){reject(new Error('사진 파일만 선택할 수 있어요.'));return}
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      const max=900;
      const scale=Math.min(1,max/Math.max(img.width,img.height));
      const canvas=document.createElement('canvas');
      canvas.width=Math.max(1,Math.round(img.width*scale));
      canvas.height=Math.max(1,Math.round(img.height*scale));
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#FFFCF7';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg',.8));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('사진을 불러오지 못했어요.'))};
    img.src=url;
  });
}

document.addEventListener('submit',e=>{
  const form=e.target.closest('[data-login-form]');
  if(!form)return;
  e.preventDefault();
  const email=validateLogin(form);
  if(!email)return;
  state.isLoggedIn=true;
  state.isGuest=false;
  state.userEmail=email;
  nav('intro');
  showToast('로그인 완료');
});

document.addEventListener('click',e=>{
  const guest=e.target.closest('[data-guest]');
  if(guest){state.isLoggedIn=true;state.isGuest=true;state.userEmail='guest@gro.app';nav('intro');showToast('비회원으로 시작했어요');return}
  const logout=e.target.closest('[data-logout]');
  if(logout){resetState();render();showToast('로그아웃했어요');return}
  const navBtn=e.target.closest('[data-nav]');
  if(navBtn){if(navBtn.dataset.nav==='recommend'&&state.screen==='water')selectTopRecommendation();nav(navBtn.dataset.nav);return}
  const ans=e.target.closest('[data-answer]');
  if(ans){state.answers[ans.dataset.answer]=ans.dataset.value;save();render();return}
  const plant=e.target.closest('[data-select-plant]');
  if(plant){state.selectedPlant=plant.dataset.selectPlant;state.plantName=plants[state.selectedPlant].nickname||plants[state.selectedPlant].name;save();render();return}
  const task=e.target.closest('[data-task]');
  if(task){state.tasks[task.dataset.task]=!state.tasks[task.dataset.task];save();render();return}
  const condition=e.target.closest('[data-condition]');
  if(condition){
    state.recordDraft.condition=condition.dataset.condition;
    save();
    document.querySelectorAll('[data-condition]').forEach(button=>{
      const selected=button===condition;
      button.classList.toggle('selected',selected);
      button.setAttribute('aria-pressed',String(selected));
    });
    return;
  }
  const add=e.target.closest('[data-add-record]');
  if(add){if(state.records.some(r=>r.date==='오늘')){showToast('오늘 기록은 이미 추가됐어요');return}nav('addRecord');return}
  const saveRecord=e.target.closest('[data-save-record]');
  if(saveRecord){
    if(!state.recordDraft.img){showToast('먼저 오늘의 사진을 추가해 주세요');return}
    if(state.records.some(r=>r.date==='오늘')){showToast('오늘 기록은 이미 추가됐어요');nav('records');return}
    state.records.unshift({date:'오늘',img:state.recordDraft.img,condition:state.recordDraft.condition,memo:state.recordDraft.memo.trim()});
    state.tasks.record=true;
    state.recordDraft={condition:'좋음',memo:'',img:''};
    save();
    nav('records');
    showToast('오늘의 성장 기록을 저장했어요');
    return;
  }
  const toast=e.target.closest('[data-toast]');
  if(toast){showToast(toast.dataset.toast);return}
  const reset=e.target.closest('[data-reset]');
  if(reset){resetState();render();showToast('초기화했어요')}
});

document.addEventListener('keydown',e=>{
  const navTarget=e.target.closest?.('[role="button"][data-nav]');
  if(!navTarget||!['Enter',' '].includes(e.key))return;
  e.preventDefault();
  nav(navTarget.dataset.nav);
});

document.addEventListener('input',e=>{
  if(e.target.matches('[data-name="plantName"]')){state.plantName=normalizePlantName(e.target.value);save();return}
  if(e.target.matches('[data-record-memo]')){state.recordDraft.memo=e.target.value;save();return}
  if(e.target.matches('[data-login-email],[data-login-password]')){
    e.target.removeAttribute('aria-invalid');
    e.target.closest('.input-field')?.classList.remove('invalid');
    const error=document.querySelector('[data-login-error]');
    if(error)error.textContent='';
  }
});

document.addEventListener('change',async e=>{
  if(!e.target.matches('[data-record-photo]'))return;
  const file=e.target.files?.[0];
  if(!file)return;
  try{
    const picker=e.target.closest('.record-photo-picker');
    picker?.classList.add('loading');
    state.recordDraft.img=await compressRecordPhoto(file);
    save();
    render();
    showToast('사진을 추가했어요');
  }catch(error){
    showToast(error.message||'사진을 추가하지 못했어요');
  }
});
window.__GRO_APP__={get state(){return state},nav,render};
render();
</script>
